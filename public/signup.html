<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DebugX — Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #07090f;
      --card: #0f1520;
      --border: rgba(59,130,246,0.15);
      --blue: #3b82f6;
      --blue2: #60a5fa;
      --blue-glow: rgba(59,130,246,0.4);
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      pointer-events: none;
    }

    .orb {
      position: fixed;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(59,130,246,0.1) 0%, transparent 70%);
      border-radius: 50%;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 36px;
      justify-content: center;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: var(--blue);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      color: white;
      box-shadow: 0 0 16px var(--blue-glow);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: white;
    }

    .logo-text span { color: var(--blue2); }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      color: white;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 36px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-field {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      outline: none;
      transition: all 0.2s;
    }

    .input-field::placeholder { color: var(--muted); }

    .input-field:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px var(--blue-glow);
      margin-top: 8px;
    }

    .btn-primary:hover {
      background: var(--blue2);
      box-shadow: 0 0 32px rgba(59,130,246,0.6);
      transform: translateY(-1px);
    }

    .terms {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }

    .terms a { color: var(--blue2); text-decoration: none; }

    .footer-text {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-top: 24px;
    }

    .footer-text a {
      color: var(--blue2);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-text a:hover { text-decoration: underline; }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }

    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 24px;
      transition: color 0.2s;
    }

    .back-link:hover { color: var(--blue2); }

    .password-strength {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      margin-top: 8px;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      border-radius: 2px;
      transition: all 0.3s;
      width: 0%;
    }
  </style>
</head>
<body>
  <div class="orb"></div>

  <div class="card">
    <a href="index.html" class="back-link">← Back to home</a>

    <a href="index.html" class="logo">
      <div class="logo-icon">DX</div>
      <span class="logo-text">Debug<span>X</span></span>
    </a>

    <h2>Create account</h2>
    <p class="subtitle">Start submitting bugs and getting fixes fast</p>

    <div class="alert error" id="errorAlert"></div>
    <div class="alert success" id="successAlert"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" class="input-field" id="name" placeholder="John Doe" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="input-field" id="email" placeholder="you@example.com" />
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" class="input-field" id="password" placeholder="Min. 6 characters" oninput="checkStrength(this.value)" />
      <div class="password-strength"><div class="password-strength-bar" id="strengthBar"></div></div>
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" class="input-field" id="confirmPassword" placeholder="Repeat password" />
    </div>

    <button class="btn-primary" onclick="handleSignup()">Create Account</button>

    <p class="terms">By signing up you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>

    <p class="footer-text">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    function checkStrength(val) {
      const bar = document.getElementById('strengthBar');
      if (val.length === 0) { bar.style.width = '0%'; return; }
      if (val.length < 4) { bar.style.width = '25%'; bar.style.background = '#ef4444'; }
      else if (val.length < 6) { bar.style.width = '50%'; bar.style.background = '#f97316'; }
      else if (val.length < 10) { bar.style.width = '75%'; bar.style.background = '#eab308'; }
      else { bar.style.width = '100%'; bar.style.background = '#22c55e'; }
    }

    async function handleSignup() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const errorAlert = document.getElementById('errorAlert');
      const successAlert = document.getElementById('successAlert');

      errorAlert.style.display = 'none';
      successAlert.style.display = 'none';

      if (!name || !email || !password || !confirmPassword) {
        errorAlert.textContent = 'Please fill in all fields.';
        errorAlert.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        errorAlert.textContent = 'Password must be at least 6 characters.';
        errorAlert.style.display = 'block';
        return;
      }

      if (password !== confirmPassword) {
        errorAlert.textContent = 'Passwords do not match.';
        errorAlert.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (res.ok) {
          successAlert.textContent = 'Account created! Redirecting...';
          successAlert.style.display = 'block';
          setTimeout(() => window.location.href = '/dashboard.html', 1200);
        } else {
          errorAlert.textContent = data.message || 'Signup failed. Try again.';
          errorAlert.style.display = 'block';
        }
      } catch (err) {
        errorAlert.textContent = 'Server error. Please try again.';
        errorAlert.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
  </script>
</body>
</html>
